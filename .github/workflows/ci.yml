name: CI

on:
  push:
  pull_request:

jobs:
  smoke-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install "git+https://github.com/ForestTiger-GH/stratbox.git"

      - name: Release integrity
        run: python scripts/check_release_integrity.py

      - name: Core dependency smoke
        env:
          PYTHONPATH: src
        run: python scripts/check_internal_imports.py --core-only

      - name: Pytest
        env:
          PYTHONPATH: src
        run: pytest
